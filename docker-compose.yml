services:
  ana-food:
    build: .
    container_name: ana-food-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: ana-food-worker
    restart: unless-stopped
    command: ["node", "worker.js"]
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: ana-food-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
